<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Study Timer</title>
    <style>
        /* カフェをイメージした配色 */
        :root {
            --primary-coffee: #4a2c11;  /* 深煎りコーヒー（メイン文字・アクティブ色） */
            --accent-latte: #c8b195;    /* ふんわりラテアート */
            --accent-green: #5a7052;    /* 深みのあるオリーブグリーン（START） */
            --accent-terracotta: #b85a3a; /* レンガ色（休憩・アラート） */
            --text-main: #2b1a0a;       /* 濃い目のブラウン */
            --text-sub: #6e5843;        /* 薄めのブラウン */
        }

        body {
            font-family: 'Georgia', 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            letter-spacing: 0.05em;
            
            /* 背景画像の設定 */
            background-image: url('cafe.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* 音楽コントロールボタン */
        .audio-control {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            color: var(--primary-coffee);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .audio-control:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        /* すりガラス風のコンテナ */
        .glass-card {
            background: rgba(255, 255, 255, 0.65); /* 半透明の白 */
            backdrop-filter: blur(12px);          /* 背景を程よくぼかす */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border-radius: 24px;
        }

        /* 全体コンテナ */
        .container {
            max-width: 460px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            margin-bottom: 25px;
            margin-top: 40px;
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
            font-weight: 600;
            color: var(--primary-coffee);
            font-family: 'Times New Roman', serif;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-sub);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* タブ切り替え */
        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
            background: rgba(0, 0, 0, 0.06);
            padding: 5px;
            border-radius: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 11px 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: var(--text-sub);
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary-coffee);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(92, 64, 51, 0.15);
        }

        .status-label {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 10px;
            font-style: italic;
        }

        /* タイマー表示 */
        .timer-display {
            font-size: 72px;
            font-weight: 300;
            color: var(--primary-coffee);
            margin: 15px 0 35px 0;
            font-family: 'Courier New', Courier, monospace;
        }

        /* コントロールボタン群 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button.main-btn {
            padding: 13px 35px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.1em;
        }

        button.main-btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .start-btn { background-color: var(--accent-green); color: white; }
        .pause-btn { background-color: var(--accent-latte); color: var(--primary-coffee); }
        .reset-btn { background-color: transparent; color: var(--text-sub); border: 1px solid rgba(110, 88, 67, 0.5) !important; }

        /* カスタム設定エリア */
        .custom-inputs {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            color: var(--text-main);
        }

        .custom-inputs input {
            width: 60px;
            padding: 8px 10px;
            font-size: 15px;
            border: 1px solid rgba(110, 88, 67, 0.3);
            background-color: rgba(255, 255, 255, 0.5);
            color: var(--primary-coffee);
            border-radius: 8px;
            text-align: center;
            outline: none;
        }

        /* ログエリア */
        .log-container {
            max-width: 460px;
            width: 100%;
            padding: 30px;
            box-sizing: border-box;
        }

        .log-container h2 {
            font-size: 15px;
            margin-top: 0;
            border-bottom: 1px dashed rgba(110, 88, 67, 0.3);
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            color: var(--primary-coffee);
            font-weight: 600;
        }

        .log-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 160px;
            overflow-y: auto;
            text-align: left;
        }

        .log-item {
            padding: 12px 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-main);
        }

        .log-time { 
            color: var(--text-sub); 
            font-size: 11px;
        }
    </style>
</head>
<body>

    <audio id="bgm" src="cafe.mp3" loop></audio>

    <button class="audio-control" id="audio-toggle" onclick="toggleBGM()">BGM: OFF</button>

    <div class="container glass-card">
        <h1>Cafe Study Timer</h1>
        <div class="subtitle">~ Slow & Steady ~</div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('pomodoro')">Pomodoro</button>
            <button class="tab-btn" onclick="switchMode('stopwatch')">Stopwatch</button>
            <button class="tab-btn" onclick="switchMode('custom')">Custom</button>
        </div>

        <div class="status-label" id="status-label">集中時間 (25分)</div>
        
        <div class="custom-inputs" id="custom-inputs">
            <input type="number" id="custom-minutes" min="1" max="180" value="10"> min
            <button onclick="setCustomTime()" style="padding: 8px 14px; border-radius: 20px; border: 1px solid var(--primary-coffee); background: none; color: var(--primary-coffee); cursor: pointer; font-size: 12px;">変更</button>
        </div>

        <div class="timer-display" id="timer-display">25:00</div>

        <div class="controls">
            <button class="main-btn start-btn" id="start-btn" onclick="startTimer()">START</button>
            <button class="main-btn pause-btn" id="pause-btn" onclick="pauseTimer()" style="display:none;">PAUSE</button>
            <button class="main-btn reset-btn" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <div class="log-container glass-card">
        <h2>
            <span>Study Log</span>
            <span id="total-study-time" style="font-size: 13px; color: var(--text-sub);">Total: 0 min</span>
        </h2>
        <ul class="log-list" id="log-list"></ul>
    </div>

    <script>
        let currentMode = 'pomodoro'; 
        let pomodoroState = 'work';   
        let timerInterval = null;
        let isRunning = false;
        
        let timeLeft = 25 * 60; 
        let stopwatchSeconds = 0;
        let customSeconds = 10 * 60;
        let totalStudyMinutes = 0;

        const display = document.getElementById('timer-display');
        const statusLabel = document.getElementById('status-label');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const customInputs = document.getElementById('custom-inputs');
        const logList = document.getElementById('log-list');
        const totalDisplay = document.getElementById('total-study-time');
        
        const bgm = document.getElementById('bgm');
        const audioToggle = document.getElementById('audio-toggle');

        function toggleBGM() {
            if (bgm.paused) {
                bgm.play().catch(error => {
                    console.log("BGM playback blocked by browser.");
                });
                audioToggle.innerText = "BGM: ON";
                audioToggle.style.background = "var(--primary-coffee)";
                audioToggle.style.color = "#ffffff";
            } else {
                bgm.pause();
                audioToggle.innerText = "BGM: OFF";
                audioToggle.style.background = "rgba(255, 255, 255, 0.75)";
                audioToggle.style.color = "var(--primary-coffee)";
            }
        }

        function switchMode(mode) {
            clearInterval(timerInterval);
            isRunning = false;
            currentMode = mode;
            
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');

            customInputs.style.display = 'none';

            if (mode === 'pomodoro') {
                pomodoroState = 'work';
                timeLeft = 25 * 60;
                statusLabel.innerText = "集中時間 (25分)";
                updateDisplay(timeLeft);
            } else if (mode === 'stopwatch') {
                stopwatchSeconds = 0;
                statusLabel.innerText = "ストップウォッチ";
                updateDisplay(0);
            } else if (mode === 'custom') {
                customInputs.style.display = 'flex';
                statusLabel.innerText = "カスタムタイマー";
                setCustomTime();
            }
        }

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            display.innerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function setCustomTime() {
            if(isRunning) return;
            const mins = parseInt(document.getElementById('custom-minutes').value) || 10;
            customSeconds = mins * 60;
            updateDisplay(customSeconds);
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';

            timerInterval = setInterval(() => {
                if (currentMode === 'stopwatch') {
                    stopwatchSeconds++;
                    updateDisplay(stopwatchSeconds);
                } else {
                    let targetSeconds = currentMode === 'pomodoro' ? timeLeft : customSeconds;
                    targetSeconds--;

                    if (currentMode === 'pomodoro') timeLeft = targetSeconds;
                    else customSeconds = targetSeconds;

                    updateDisplay(targetSeconds);

                    if (targetSeconds <= 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        startBtn.style.display = 'inline-block';
                        pauseBtn.style.display = 'none';
                        timerFinished();
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';

            if (currentMode === 'pomodoro') {
                pomodoroState = 'work';
                timeLeft = 25 * 60;
                statusLabel.innerText = "集中時間 (25分)";
                updateDisplay(timeLeft);
            } else if (currentMode === 'stopwatch') {
                if (stopwatchSeconds > 0) {
                    addLog("Stopwatch", Math.round(stopwatchSeconds / 60));
                }
                stopwatchSeconds = 0;
                updateDisplay(0);
            } else if (currentMode === 'custom') {
                setCustomTime();
            }
        }

        function timerFinished() {
            alert("設定した時間が経過しました。次のステップへ進みましょう。");

            if (currentMode === 'pomodoro') {
                if (pomodoroState === 'work') {
                    addLog("Pomodoro (Work)", 25);
                    pomodoroState = 'break';
                    timeLeft = 5 * 60;
                    statusLabel.innerText = "休憩時間 (5分)";
                    statusLabel.style.color = "var(--accent-terracotta)";
                    updateDisplay(timeLeft);
                } else {
                    pomodoroState = 'work';
                    timeLeft = 25 * 60;
                    statusLabel.innerText = "集中時間 (25分)";
                    statusLabel.style.color = "var(--text-sub)";
                    updateDisplay(timeLeft);
                }
            } else if (currentMode === 'custom') {
                const mins = parseInt(document.getElementById('custom-minutes').value) || 10;
                addLog("Custom Timer", mins);
                setCustomTime();
            }
        }

        function addLog(activityName, minutes) {
            if (minutes === 0 && currentMode === 'stopwatch' && stopwatchSeconds > 0) {
                minutes = 1; 
            }
            if (minutes <= 0) return;

            const now = new Date();
            const timeString = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

            const li = document.createElement('li');
            li.className = 'log-item';
            li.innerHTML = `
                <span>${activityName} - <strong>${minutes} min</strong> 完了</span>
                <span class="log-time">${timeString}</span>
            `;
            
            logList.insertBefore(li, logList.firstChild);

            totalStudyMinutes += minutes;
            totalDisplay.innerText = `Total: ${totalStudyMinutes} min`;
        }
    </script>
</body>
</html>
