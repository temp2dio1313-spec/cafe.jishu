<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オンライン自習室</title>
    <style>
        :root {
            --bg-overlay: rgba(0, 0, 0, 0.5);
            --panel-bg: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --accent-color: #4caf50;
            --accent-hover: #45a049;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: url('001.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 背景のオーバーレイ（文字を読みやすくするため） */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            z-index: 1;
        }

        /* メインコンテナ */
        .container {
            position: relative;
            z-index: 2;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 400px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            letter-spacing: 2px;
        }

        /* モード切り替えタブ */
        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 5px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-color);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 8px;
            transition: background 0.3s;
            flex: 1;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.25);
            font-weight: bold;
        }

        /* タイマー表示エリア */
        .timer-display {
            font-size: 64px;
            font-weight: 300;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .status-text {
            font-size: 16px;
            margin-bottom: 15px;
            height: 24px;
            color: #ddd;
        }

        /* カスタム入力フォーム */
        .custom-input-wrap {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .custom-input-wrap input {
            width: 60px;
            padding: 8px;
            border-radius: 5px;
            border: none;
            text-align: center;
            font-size: 16px;
        }

        /* コントロールボタン */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 10px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 100px;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* オーディオコントロール */
        .audio-controls {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .audio-controls input[type="range"] {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>自習室</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('pomodoro')">ポモドーロ</button>
            <button class="tab-btn" onclick="switchMode('stopwatch')">ストップウォッチ</button>
            <button class="tab-btn" onclick="switchMode('custom')">カスタム</button>
        </div>

        <div class="status-text" id="status-text">集中タイム (25分)</div>

        <div class="timer-display" id="timer-display">25:00</div>

        <div class="custom-input-wrap" id="custom-input-wrap">
            <input type="number" id="custom-minutes" min="0" max="180" value="10"> 分
        </div>

        <div class="controls">
            <button class="btn" id="start-stop-btn" onclick="toggleTimer()">スタート</button>
            <button class="btn secondary" id="reset-btn" onclick="resetTimer()">リセット</button>
        </div>

        <div class="audio-controls">
            <span>BGM 001.mp3:</span>
            <button class="btn secondary" id="audio-toggle-btn" onclick="toggleAudio()" style="padding: 5px 10px; min-width: auto; font-size: 12px;">再生</button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume(this.value)">
        </div>
    </div>

    <audio id="bgm" src="001.mp3" loop></audio>

    <script>
        // タイマーの状態管理
        let currentMode = 'pomodoro'; // pomodoro, stopwatch, custom
        let timerState = 'stopped'; // running, stopped
        let timerInterval = null;
        
        // 時間保持用 (秒単位)
        let timeLeft = 25 * 60; 
        let stopwatchTime = 0;
        let pomodoroSession = 'work'; // work (集中), break (休憩)

        // 要素の取得
        const display = document.getElementById('timer-display');
        const statusText = document.getElementById('status-text');
        const startStopBtn = document.getElementById('start-stop-btn');
        const customInputWrap = document.getElementById('custom-input-wrap');
        const customMinutesInput = document.getElementById('custom-minutes');
        const bgm = document.getElementById('bgm');
        const audioToggleBtn = document.getElementById('audio-toggle-btn');

        // 表示の更新
        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            display.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // モード切り替え
        function switchMode(mode) {
            clearInterval(timerInterval);
            timerState = 'stopped';
            startStopBtn.textContent = 'スタート';
            currentMode = mode;

            // タブの活動状態を変更
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // カスタム入力の表示制御
            if (mode === 'custom') {
                customInputWrap.style.display = 'flex';
            } else {
                customInputWrap.style.display = 'none';
            }

            // 初期値のリセット
            resetTimer();
        }

        // タイマーのリセット
        function resetTimer() {
            clearInterval(timerInterval);
            timerState = 'stopped';
            startStopBtn.textContent = 'スタート';

            if (currentMode === 'pomodoro') {
                pomodoroSession = 'work';
                timeLeft = 25 * 60;
                statusText.textContent = '集中タイム (25分)';
                updateDisplay(timeLeft);
            } else if (currentMode === 'stopwatch') {
                stopwatchTime = 0;
                statusText.textContent = '計測中ではありません';
                updateDisplay(stopwatchTime);
            } else if (currentMode === 'custom') {
                const mins = parseInt(customMinutesInput.value) || 0;
                timeLeft = mins * 60;
                statusText.textContent = `カスタムタイマー (${mins}分)`;
                updateDisplay(timeLeft);
            }
        }

        // スタート・ストップの切り替え
        function toggleTimer() {
            if (timerState === 'stopped') {
                // スタートする
                timerState = 'running';
                startStopBtn.textContent = '一時停止';
                
                if (currentMode === 'stopwatch') {
                    statusText.textContent = '流れる時間を記録中...';
                    timerInterval = setInterval(() => {
                        stopwatchTime++;
                        updateDisplay(stopwatchTime);
                    }, 1000);
                } else {
                    // ポモドーロ、またはカスタム
                    if (currentMode === 'custom' && timeLeft === 0) {
                        // 0分でスタートされた場合の再設定
                        const mins = parseInt(customMinutesInput.value) || 0;
                        timeLeft = mins * 60;
                    }
                    
                    timerInterval = setInterval(() => {
                        if (timeLeft > 0) {
                            timeLeft--;
                            updateDisplay(timeLeft);
                        } else {
                            // タイマー終了時の処理
                            clearInterval(timerInterval);
                            timerState = 'stopped';
                            startStopBtn.textContent = 'スタート';
                            handleTimerComplete();
                        }
                    }, 1000);
                }
            } else {
                // 一時停止する
                clearInterval(timerInterval);
                timerState = 'stopped';
                startStopBtn.textContent = '再開';
                if (currentMode === 'stopwatch') statusText.textContent = '一時停止中';
            }
        }

        // タイマー完了時の挙動（ポモドーロの切り替えなど）
        function handleTimerComplete() {
            // ブラウザの通知音（簡易的なアラート）
            alert('時間になりました！');

            if (currentMode === 'pomodoro') {
                if (pomodoroSession === 'work') {
                    pomodoroSession = 'break';
                    timeLeft = 5 * 60; // 5分休憩
                    statusText.textContent = '休憩タイム (5分)';
                } else {
                    pomodoroSession = 'work';
                    timeLeft = 25 * 60; // 25分集中
                    statusText.textContent = '集中タイム (25分)';
                }
                updateDisplay(timeLeft);
            }
        }

        // カスタム時間の入力が変更されたとき
        customMinutesInput.addEventListener('input', () => {
            if (currentMode === 'custom' && timerState === 'stopped') {
                const mins = parseInt(customMinutesInput.value) || 0;
                timeLeft = mins * 60;
                statusText.textContent = `カスタムタイマー (${mins}分)`;
                updateDisplay(timeLeft);
            }
        });

        // --- BGMの制御 ---
        function toggleAudio() {
            if (bgm.paused) {
                bgm.play().catch(e => console.log("ユーザーインタラクションが必要です:", e));
                audioToggleBtn.textContent = '停止';
            } else {
                bgm.pause();
                audioToggleBtn.textContent = '再生';
            }
        }

        function changeVolume(volume) {
            bgm.volume = volume;
        }

        // 初期表示の設定
        updateDisplay(timeLeft);
    </script>
</body>
</html>
