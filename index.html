<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Study Timer</title>
    <style>
        /* カフェをイメージした配色（アースカラー） */
        :root {
            --bg-color: #f7f4ef;        /* ミルクたっぷりのカフェラテ（背景） */
            --card-bg: #ffffff;         /* 清潔感のあるリネン（カード裏地） */
            --primary-coffee: #5c4033;  /* 深煎りコーヒー（メイン文字・アクティブ色） */
            --accent-latte: #c8b195;    /* ふんわりラテアート（サブ色・ボーダー） */
            --accent-green: #7d8c7c;    /* カフェの観葉植物（スタート・ポジティブ色） */
            --accent-terracotta: #c97a63; /* レンガの壁（ポモドーロ休憩・アラート色） */
            --text-main: #3e2723;       /* カカオニブ（メインテキスト） */
            --text-sub: #8d7768;        /* シナモンパウダー（補足テキスト） */
        }

        body {
            font-family: 'Georgia', 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: 0.05em;
        }

        /* 全体コンテナ（カフェのメニュー表を意識） */
        .container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(92, 64, 51, 0.06);
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(200, 177, 149, 0.3);
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
            font-weight: 600;
            color: var(--primary-coffee);
            font-family: 'Times New Roman', serif;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* ナチュラルなタブ切り替え */
        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
            background: #f0eae1;
            padding: 6px;
            border-radius: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: var(--text-sub);
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary-coffee);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(92, 64, 51, 0.2);
        }

        /* 状態ラベル */
        .status-label {
            font-size: 15px;
            font-weight: normal;
            color: var(--text-sub);
            margin-bottom: 10px;
            font-style: italic;
        }

        /* 美しいタイマー表示 */
        .timer-display {
            font-size: 72px;
            font-weight: 300;
            color: var(--primary-coffee);
            margin: 15px 0 35px 0;
            font-family: 'Courier New', Courier, monospace; /* 等幅でクラシックに */
        }

        /* コントロールボタン群 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        button.main-btn {
            padding: 14px 35px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.1em;
        }

        button.main-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button.main-btn:active {
            transform: translateY(1px);
        }

        .start-btn { background-color: var(--accent-green); color: white; }
        .pause-btn { background-color: var(--accent-latte); color: var(--primary-coffee); }
        .reset-btn { background-color: transparent; color: var(--text-sub); border: 1px solid var(--accent-latte) !important; }

        /* カスタム設定エリア */
        .custom-inputs {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            color: var(--text-main);
        }

        .custom-inputs input {
            width: 60px;
            padding: 8px 10px;
            font-size: 15px;
            border: 1px solid var(--accent-latte);
            background-color: var(--bg-color);
            color: var(--primary-coffee);
            border-radius: 8px;
            text-align: center;
            outline: none;
        }

        /* ログ（レコード）エリア */
        .log-container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(92, 64, 51, 0.04);
            border: 1px solid rgba(200, 177, 149, 0.3);
        }

        .log-container h2 {
            font-size: 16px;
            margin-top: 0;
            border-bottom: 1px dashed var(--accent-latte);
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            color: var(--primary-coffee);
            font-weight: 600;
        }

        .log-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 180px;
            overflow-y: auto;
            text-align: left;
        }

        .log-item {
            padding: 12px 5px;
            border-bottom: 1px solid #fcfbfa;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-main);
        }

        .log-time { 
            color: var(--text-sub); 
            font-size: 11px;
        }
        
        strong {
            color: var(--primary-coffee);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cafe Study Timer</h1>
        <div class="subtitle">~ Slow & Steady ~</div>
        
        <!-- モード切り替えタブ -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('pomodoro')">Pomodoro</button>
            <button class="tab-btn" onclick="switchMode('stopwatch')">Stopwatch</button>
            <button class="tab-btn" onclick="switchMode('custom')">Custom</button>
        </div>

        <div class="status-label" id="status-label">集中時間 (25分)</div>
        
        <!-- カスタムタイマー用入力欄 -->
        <div class="custom-inputs" id="custom-inputs">
            <input type="number" id="custom-minutes" min="1" max="180" value="10"> min
            <button onclick="setCustomTime()" style="padding: 8px 14px; border-radius: 20px; border: 1px solid var(--primary-coffee); background: none; color: var(--primary-coffee); cursor: pointer; font-size: 12px;">変更</button>
        </div>

        <!-- タイマー時間表示 -->
        <div class="timer-display" id="timer-display">25:00</div>

        <!-- 操作ボタン -->
        <div class="controls">
            <button class="main-btn start-btn" id="start-btn" onclick="startTimer()">START</button>
            <button class="main-btn pause-btn" id="pause-btn" onclick="pauseTimer()" style="display:none;">PAUSE</button>
            <button class="main-btn reset-btn" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <!-- 勉強時間の記録 -->
    <div class="log-container">
        <h2>
            <span>☕ 今日のオーダー（記録）</span>
            <span id="total-study-time" style="font-size: 13px; color: var(--text-sub);">Total: 0 min</span>
        </h2>
        <ul class="log-list" id="log-list">
            <!-- JavaScriptでここにログが追加されます -->
        </ul>
    </div>

    <script>
        // 状態管理変数
        let currentMode = 'pomodoro'; 
        let pomodoroState = 'work';   
        let timerInterval = null;
        let isRunning = false;
        
        let timeLeft = 25 * 60; 
        let stopwatchSeconds = 0;
        let customSeconds = 10 * 60;
        let totalStudyMinutes = 0;

        const display = document.getElementById('timer-display');
        const statusLabel = document.getElementById('status-label');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const customInputs = document.getElementById('custom-inputs');
        const logList = document.getElementById('log-list');
        const totalDisplay = document.getElementById('total-study-time');

        function switchMode(mode) {
            clearInterval(timerInterval);
            isRunning = false;
            currentMode = mode;
            
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            customInputs.style.display = 'none';

            if (mode === 'pomodoro') {
                pomodoroState = 'work';
                timeLeft = 25 * 60;
                statusLabel.innerText = "集中時間 (25分)";
                updateDisplay(timeLeft);
            } else if (mode === 'stopwatch') {
                stopwatchSeconds = 0;
                statusLabel.innerText = "ストップウォッチ";
                updateDisplay(0);
            } else if (mode === 'custom') {
                customInputs.style.display = 'flex';
                statusLabel.innerText = "カスタムタイマー";
                setCustomTime();
            }
        }

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            display.innerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function setCustomTime() {
            if(isRunning) return;
            const mins = parseInt(document.getElementById('custom-minutes').value) || 10;
            customSeconds = mins * 60;
            updateDisplay(customSeconds);
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';

            timerInterval = setInterval(() => {
                if (currentMode === 'stopwatch') {
                    stopwatchSeconds++;
                    updateDisplay(stopwatchSeconds);
                } else {
                    let targetSeconds = currentMode === 'pomodoro' ? timeLeft : customSeconds;
                    targetSeconds--;

                    if (currentMode === 'pomodoro') timeLeft = targetSeconds;
                    else customSeconds = targetSeconds;

                    updateDisplay(targetSeconds);

                    if (targetSeconds <= 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        startBtn.style.display = 'inline-block';
                        pauseBtn.style.display = 'none';
                        timerFinished();
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';

            if (currentMode === 'pomodoro') {
                pomodoroState = 'work';
                timeLeft = 25 * 60;
                statusLabel.innerText = "集中時間 (25分)";
                updateDisplay(timeLeft);
            } else if (currentMode === 'stopwatch') {
                if (stopwatchSeconds > 0) {
                    addLog("Stopwatch ドリップ", Math.round(stopwatchSeconds / 60));
                }
                stopwatchSeconds = 0;
                updateDisplay(0);
            } else if (currentMode === 'custom') {
                setCustomTime();
            }
        }

        function timerFinished() {
            alert("Bell が鳴りました。ブレイクタイム、または次のステップへ！");

            if (currentMode === 'pomodoro') {
                if (pomodoroState === 'work') {
                    addLog("Pomodoro (集中)", 25);
                    pomodoroState = 'break';
                    timeLeft = 5 * 60;
                    statusLabel.innerText = "休憩時間 (5分)";
                    statusLabel.style.color = "var(--accent-terracotta)";
                    updateDisplay(timeLeft);
                } else {
                    pomodoroState = 'work';
                    timeLeft = 25 * 60;
                    statusLabel.innerText = "集中時間 (25分)";
                    statusLabel.style.color = "var(--text-sub)";
                    updateDisplay(timeLeft);
                }
            } else if (currentMode === 'custom') {
                const mins = parseInt(document.getElementById('custom-minutes').value) || 10;
                addLog("Custom タイマー", mins);
                setCustomTime();
            }
        }

        function addLog(activityName, minutes) {
            if (minutes === 0 && currentMode === 'stopwatch' && stopwatchSeconds > 0) {
                minutes = 1; 
            }
            if (minutes <= 0) return;

            const now = new Date();
            const timeString = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

            const li = document.createElement('li');
            li.className = 'log-item';
            li.innerHTML = `
                <span>☕ ${activityName} - <strong>${minutes}分</strong> 淹れました</span>
                <span class="log-time">${timeString}</span>
            `;
            
            logList.insertBefore(li, logList.firstChild);

            totalStudyMinutes += minutes;
            totalDisplay.innerText = `Total: ${totalStudyMinutes} min`;
        }
    </script>
</body>
</html>
