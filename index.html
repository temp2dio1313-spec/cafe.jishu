<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタディタイマー & ログ</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #4a90e2;
            --pomodoro-color: #ff6b6b;
            --short-break-color: #51cf66;
            --text-color: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #444;
        }

        /* タブ切り替え */
        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            background: #eee;
            padding: 5px;
            border-radius: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #666;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        /* タイマー表示表示 */
        .timer-display {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .status-label {
            font-size: 18px;
            font-weight: bold;
            color: #777;
            margin-bottom: 10px;
        }

        /* コントロール群 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button.main-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button.main-btn:active {
            transform: scale(0.98);
        }

        .start-btn { background-color: #20c997; color: white; }
        .pause-btn { background-color: #fcc419; color: white; }
        .reset-btn { background-color: #adb5bd; color: white; }

        /* カスタム設定用 */
        .custom-inputs {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .custom-inputs input {
            width: 70px;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: center;
        }

        /* 記録エリア */
        .log-container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .log-container h2 {
            font-size: 18px;
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .log-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }

        .log-item {
            padding: 10px 5px;
            border-bottom: 1px solid #f1f1f1;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .log-time { color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <h1>学習タイマー</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('pomodoro')">ポモドーロ</button>
            <button class="tab-btn" onclick="switchMode('stopwatch')">ストップウォッチ</button>
            <button class="tab-btn" onclick="switchMode('custom')">カスタム</button>
        </div>

        <div class="status-label" id="status-label">集中時間 (25分)</div>
        
        <div class="custom-inputs" id="custom-inputs">
            <input type="number" id="custom-minutes" min="0" max="180" value="10"> 分
            <button onclick="setCustomTime()" style="padding: 6px 12px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer;">設定</button>
        </div>

        <div class="timer-display" id="timer-display">25:00</div>

        <div class="controls">
            <button class="main-btn start-btn" id="start-btn" onclick="startTimer()">スタート</button>
            <button class="main-btn pause-btn" id="pause-btn" onclick="pauseTimer()" style="display:none;">一時停止</button>
            <button class="main-btn reset-btn" onclick="resetTimer()">リセット</button>
        </div>
    </div>

    <div class="log-container">
        <h2>
            <span>📝 勉強の記録</span>
            <span id="total-study-time" style="font-size: 14px; color: #4a90e2;">合計: 0分</span>
        </h2>
        <ul class="log-list" id="log-list">
            </ul>
    </div>

    <script>
        // 状態管理変数
        let currentMode = 'pomodoro'; // pomodoro, stopwatch, custom
        let pomodoroState = 'work';   // work (集中), break (休憩)
        let timerInterval = null;
        let isRunning = false;
        
        // 時間管理（秒単位）
        let timeLeft = 25 * 60; 
        let stopwatchSeconds = 0;
        let customSeconds = 10 * 60;
        let totalStudyMinutes = 0;

        // HTML要素の取得
        const display = document.getElementById('timer-display');
        const statusLabel = document.getElementById('status-label');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const customInputs = document.getElementById('custom-inputs');
        const logList = document.getElementById('log-list');
        const totalDisplay = document.getElementById('total-study-time');

        // モード切り替え
        function switchMode(mode) {
            clearInterval(timerInterval);
            isRunning = false;
            currentMode = mode;
            
            // ボタン表示の初期化
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';

            // タブの活動状態アップデート
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            customInputs.style.display = 'none';

            if (mode === 'pomodoro') {
                pomodoroState = 'work';
                timeLeft = 25 * 60;
                statusLabel.innerText = "集中時間 (25分)";
                updateDisplay(timeLeft);
            } else if (mode === 'stopwatch') {
                stopwatchSeconds = 0;
                statusLabel.innerText = "ストップウォッチ";
                updateDisplay(0, true);
            } else if (mode === 'custom') {
                customInputs.style.display = 'flex';
                statusLabel.innerText = "カスタムタイマー";
                setCustomTime();
            }
        }

        // 時間の表示更新
        function updateDisplay(seconds, isStopwatch = false) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            display.innerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // カスタムタイマーの時間設定
        function setCustomTime() {
            if(isRunning) return;
            const mins = parseInt(document.getElementById('custom-minutes').value) || 10;
            customSeconds = mins * 60;
            updateDisplay(customSeconds);
        }

        // タイマースタート
        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';

            timerInterval = setInterval(() => {
                if (currentMode === 'stopwatch') {
                    stopwatchSeconds++;
                    updateDisplay(stopwatchSeconds, true);
                } else {
                    // ポモドーロ、またはカスタムタイマー（カウントダウン）
                    let targetSeconds = currentMode === 'pomodoro' ? timeLeft : customSeconds;
                    targetSeconds--;

                    if (currentMode === 'pomodoro') timeLeft = targetSeconds;
                    else customSeconds = targetSeconds;

                    updateDisplay(targetSeconds);

                    if (targetSeconds <= 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        startBtn.style.display = 'inline-block';
                        pauseBtn.style.display = 'none';
                        timerFinished();
                    }
                }
            }, 1000);
        }

        // タイマー一時停止
        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }

        // リセット処理
        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';

            if (currentMode === 'pomodoro') {
                pomodoroState = 'work';
                timeLeft = 25 * 60;
                statusLabel.innerText = "集中時間 (25分)";
                updateDisplay(timeLeft);
            } else if (currentMode === 'stopwatch') {
                // ストップウォッチはリセット時にそこまで進んだ秒数を「学習記録」に残す
                if (stopwatchSeconds > 0) {
                    addLog("ストップウォッチ学習", Math.round(stopwatchSeconds / 60));
                }
                stopwatchSeconds = 0;
                updateDisplay(0);
            } else if (currentMode === 'custom') {
                setCustomTime();
            }
        }

        // タイマー終了時の処理（カウントダウン）
        function timerFinished() {
            // アラート音の代わりにブラウザ通知風ポップアップ（音を鳴らしたい場合はAudioオブジェクトを追加してください）
            alert("時間が経ちました！");

            if (currentMode === 'pomodoro') {
                if (pomodoroState === 'work') {
                    addLog("ポモドーロ（集中）", 25);
                    // 休憩モードへ移行
                    pomodoroState = 'break';
                    timeLeft = 5 * 60;
                    statusLabel.innerText = "休憩時間 (5分)";
                    updateDisplay(timeLeft);
                } else {
                    // 休憩終了、集中モードへ戻る
                    pomodoroState = 'work';
                    timeLeft = 25 * 60;
                    statusLabel.innerText = "集中時間 (25分)";
                    updateDisplay(timeLeft);
                }
            } else if (currentMode === 'custom') {
                const mins = parseInt(document.getElementById('custom-minutes').value) || 10;
                addLog("カスタムタイマー", mins);
                setCustomTime();
            }
        }

        // ログへの追加
        function addLog(activityName, minutes) {
            // 最低でも1分未満は1分として記録、または0分ならスキップ
            if (minutes === 0 && currentMode === 'stopwatch' && stopwatchSeconds > 0) {
                minutes = 1; // 1分未満の計測でもログには1分として残す（または秒表示にする）
            }
            if (minutes <= 0) return;

            const now = new Date();
            const timeString = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

            const li = document.createElement('li');
            li.className = 'log-item';
            li.innerHTML = `
                <span>${activityName} - <strong>${minutes}分</strong> 完了</span>
                <span class="log-time">${timeString}</span>
            `;
            
            // ログの先頭に追加
            logList.insertBefore(li, logList.firstChild);

            // 合計時間の更新
            totalStudyMinutes += minutes;
            totalDisplay.innerText = `合計: ${totalStudyMinutes}分`;
        }
    </script>
</body>
</html>
